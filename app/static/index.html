<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG PDF Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 820px;
      height: 92vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 18px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-title h1 { font-size: 18px; font-weight: 700; color: #111; }
    .header-title p  { font-size: 13px; color: #888; margin-top: 2px; }

    .upload-label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #f5f5f5;
      border: 1.5px dashed #ccc;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #555;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .upload-label:hover { background: #ebebeb; }
    .upload-label input { display: none; }

    .upload-progress { display: none; font-size: 13px; color: #888; }

    /* Document bar */
    .doc-bar {
      display: none;
      padding: 10px 24px;
      border-bottom: 1px solid #eee;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .doc-bar.visible { display: flex; }

    .doc-bar-label {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      margin-right: 4px;
    }

    .doc-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      border: 1.5px solid #ddd;
      background: #fff;
      color: #555;
      transition: all 0.15s;
      max-width: 200px;
    }

    .doc-pill .pill-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .doc-pill.active {
      border-color: #1a73e8;
      background: #e8f0fe;
      color: #1a73e8;
      font-weight: 500;
    }

    .doc-pill.all-pill { font-weight: 500; }
    .doc-pill.all-pill.active { border-color: #7b1fa2; background: #f3e5f5; color: #7b1fa2; }

    .doc-pill .remove-doc {
      font-size: 15px;
      color: #aaa;
      line-height: 1;
      flex-shrink: 0;
    }

    .doc-pill .remove-doc:hover { color: #e53935; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #bbb;
      gap: 10px;
    }

    .empty-state svg { opacity: 0.4; }
    .empty-state p { font-size: 15px; }

    /* Messages */
    .message { display: flex; gap: 10px; max-width: 90%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar { background: #1a73e8; color: #fff; }
    .message.bot  .avatar { background: #f0f0f0; color: #555; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      color: #111;
    }

    .message.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #f5f5f5;
      border-bottom-left-radius: 4px;
    }

    .sources {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .source-tag {
      padding: 3px 10px;
      background: #e3f2fd;
      color: #1565c0;
      border-radius: 12px;
      font-size: 12px;
    }

    /* Typing */
    .typing .bubble { display: flex; align-items: center; gap: 4px; padding: 14px 18px; }

    .dot {
      width: 7px; height: 7px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* Input */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #1a73e8; }
    textarea:disabled { background: #fafafa; color: #aaa; }

    .send-btn {
      width: 44px; height: 44px;
      background: #1a73e8;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #1558b0; }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }
    .send-btn svg { fill: #fff; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-title">
      <h1>RAG PDF Chatbot</h1>
      <p>Upload PDFs and ask questions about their content</p>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="upload-progress" id="uploadProgress">Uploading...</span>
      <label class="upload-label">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload PDF
        <input type="file" accept=".pdf" onchange="uploadFile(this)" />
      </label>
    </div>
  </div>

  <!-- Document selector bar -->
  <div class="doc-bar" id="docBar">
    <span class="doc-bar-label">Ask about:</span>
    <div class="doc-pill all-pill active" id="allPill" onclick="selectDoc(null)">
      All documents
    </div>
    <!-- document pills injected here -->
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <p>Upload a PDF to start chatting</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      id="questionInput"
      placeholder="Ask a question about your document..."
      rows="1"
      disabled
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendQuestion()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>

</div>

<script>
  // documents: array of { document_id, filename, chunks_count }
  let documents = [];
  let selectedDocumentId = null; // null = all documents
  let conversationHistory = [];

  // ── Upload ──────────────────────────────────────────────────────────────────

  async function uploadFile(input) {
    const file = input.files[0];
    if (!file) return;

    document.getElementById('uploadProgress').style.display = 'block';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res  = await fetch('/api/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');

      // Add to documents list and select it
      documents.push({ document_id: data.document_id, filename: data.filename, chunks_count: data.chunks_count });
      renderDocBar();
      selectDoc(data.document_id);

      document.getElementById('questionInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('questionInput').focus();

      hideEmptyState();
      addMessage('bot', `**${data.filename}** uploaded — ${data.chunks_count} chunks indexed. What would you like to know?`);

    } catch (err) {
      addMessage('bot', `Upload failed: ${err.message}`);
    } finally {
      document.getElementById('uploadProgress').style.display = 'none';
      input.value = '';
    }
  }

  // ── Document bar ────────────────────────────────────────────────────────────

  function renderDocBar() {
    const bar = document.getElementById('docBar');
    bar.classList.toggle('visible', documents.length > 0);

    // Remove old doc pills (keep "All" pill)
    bar.querySelectorAll('.doc-pill:not(.all-pill)').forEach(el => el.remove());

    documents.forEach(doc => {
      const pill = document.createElement('div');
      pill.className = 'doc-pill';
      pill.dataset.id = doc.document_id;
      pill.innerHTML = `
        <span class="pill-name" title="${doc.filename}">📄 ${doc.filename}</span>
        <span class="remove-doc" onclick="removeDoc(event, '${doc.document_id}')" title="Remove">×</span>`;
      pill.addEventListener('click', () => selectDoc(doc.document_id));
      bar.appendChild(pill);
    });

    updateActivePill();
  }

  function selectDoc(docId) {
    selectedDocumentId = docId;
    conversationHistory = []; // reset history on context switch
    updateActivePill();
  }

  function updateActivePill() {
    document.getElementById('allPill').classList.toggle('active', selectedDocumentId === null);
    document.querySelectorAll('.doc-pill:not(.all-pill)').forEach(pill => {
      pill.classList.toggle('active', pill.dataset.id === selectedDocumentId);
    });
  }

  function removeDoc(event, docId) {
    event.stopPropagation();
    documents = documents.filter(d => d.document_id !== docId);
    if (selectedDocumentId === docId) selectDoc(null);
    renderDocBar();

    if (documents.length === 0) {
      document.getElementById('questionInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('messages').innerHTML = '';
      showEmptyState();
    }
  }

  // ── Query ───────────────────────────────────────────────────────────────────

  async function sendQuestion() {
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    autoResize(input);
    input.disabled = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', question);
    const typingEl = addTyping();

    try {
      const res  = await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question,
          document_id: selectedDocumentId,
          history: conversationHistory,
        }),
      });
      const data = await res.json();
      typingEl.remove();
      if (!res.ok) throw new Error(data.detail || 'Query failed');

      conversationHistory.push({ role: 'user', content: question });
      conversationHistory.push({ role: 'assistant', content: data.answer });

      addMessage('bot', data.answer, data.sources);

    } catch (err) {
      typingEl.remove();
      addMessage('bot', `Error: ${err.message}`);
    } finally {
      input.disabled = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
  }

  // ── UI helpers ──────────────────────────────────────────────────────────────

  function addMessage(role, text, sources = []) {
    hideEmptyState();
    const msgs = document.getElementById('messages');

    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);

    if (sources.length > 0) {
      const sourcesDiv = document.createElement('div');
      sourcesDiv.className = 'sources';
      const unique = [...new Set(sources.map(s => s.section ? `${s.section} (p.${s.page})` : `p.${s.page}`))];
      unique.forEach(label => {
        const tag = document.createElement('span');
        tag.className = 'source-tag';
        tag.textContent = label;
        sourcesDiv.appendChild(tag);
      });
      bubble.appendChild(sourcesDiv);
    }

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    msgs.appendChild(wrapper);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const msgs = document.getElementById('messages');
    const wrapper = document.createElement('div');
    wrapper.className = 'message bot typing';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    msgs.appendChild(wrapper);
    msgs.scrollTop = msgs.scrollHeight;
    return wrapper;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function hideEmptyState() {
    const el = document.getElementById('emptyState');
    if (el) el.remove();
  }

  function showEmptyState() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'empty-state';
    div.id = 'emptyState';
    div.innerHTML = `
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <p>Upload a PDF to start chatting</p>`;
    msgs.appendChild(div);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
